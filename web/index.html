<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Sports Day Manager</title>

    <link rel="stylesheet"
          href="css/main.css">

</head>

<body>

<header>

    <h1>🏆 Sports Day Manager</h1>

</header>

<nav>

    <button id="nav-leaderboard">
        🏆 Leaderboard
    </button>

    <button id="nav-competitors">
        👥 Competitors
    </button>

    <button id="nav-events">
        🎯 Events
    </button>

    <button id="nav-settings">
        ⚙ Settings
    </button>

</nav>

<main>

    <!-- ================================================= -->
    <!-- Leaderboard Page                                  -->
    <!-- ================================================= -->

    <section id="page-leaderboard"
             class="page">

        <h2>
            Leaderboard
        </h2>

        <div id="leaderboard">

            Loading leaderboard...

        </div>

    </section>



    <!-- ================================================= -->
    <!-- Competitors Page                                  -->
    <!-- ================================================= -->

    <section id="page-competitors"
             class="page hidden">

        <h2>
            Competitors
        </h2>

        <div class="toolbar">

            <button id="add-competitor">

                + Add Competitor

            </button>

            <input
                type="text"
                id="competitor-search"
                placeholder="Search competitors...">

        </div>

        <div id="competitor-table">

            Loading competitors...

        </div>

    </section>



    <!-- ================================================= -->
    <!-- Events Page                                       -->
    <!-- ================================================= -->

    <section id="page-events"
             class="page hidden">

        <h2>

            Events

        </h2>

        <p>

            Coming soon...

        </p>

    </section>



    <!-- ================================================= -->
    <!-- Settings Page                                     -->
    <!-- ================================================= -->

    <section id="page-settings"
             class="page hidden">

        <h2>

            Settings

        </h2>

        <p>

            Coming soon...

        </p>

    </section>

</main>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>

</body>

</html>
