<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Sports Day Manager</title>

    <link rel="stylesheet"
          href="css/main.css">

</head>


<body>

<header>

    <h1>🏆 Sports Day Manager</h1>

</header>


<nav>

    <button id="nav-leaderboard">
        🏆 Leaderboard
    </button>

    <button id="nav-competitors">
        👥 Competitors
    </button>

    <button id="nav-events">
        🎯 Events
    </button>

    <button id="nav-settings">
        ⚙️ Settings
    </button>

</nav>


<main>


<!-- ================================================= -->
<!-- Leaderboard                                       -->
<!-- ================================================= -->

<section id="page-leaderboard"
         class="page">

    <h2>
        Leaderboard
    </h2>

    <div id="leaderboard">

        Loading leaderboard...

    </div>

</section>



<!-- ================================================= -->
<!-- Competitors                                       -->
<!-- ================================================= -->

<section id="page-competitors"
         class="page hidden">


    <h2>
        Competitors
    </h2>


    <div class="toolbar">


        <button id="btn-add-competitor">

            ➕ Add Competitor

        </button>


        <input
            id="search-competitors"
            type="text"
            placeholder="Search competitors...">


        <select id="competitor-team-filter">

            <option value="">
                All Teams
            </option>

        </select>


        <select id="competitor-status">

            <option value="active">
                Active
            </option>

            <option value="inactive">
                Inactive
            </option>

            <option value="all">
                All statuses
            </option>

        </select>


    </div>


    <div id="competitor-message"
         class="hidden">

    </div>


    <div id="competitors">

        Loading competitors...

    </div>


</section>



<!-- ================================================= -->
<!-- Events                                            -->
<!-- ================================================= -->

<section id="page-events"
         class="page hidden">


    <h2>
        Events
    </h2>


    <div id="events">

        Loading events...

    </div>


    <div id="event-details">

    </div>


</section>



<!-- ================================================= -->
<!-- Settings                                          -->
<!-- ================================================= -->

<section id="page-settings"
         class="page hidden">


    <h2>
        Settings
    </h2>


    <p>

        Settings will be added in a future release.

    </p>


</section>


</main>



<!-- ================================================= -->
<!-- Competitor Modal                                  -->
<!-- ================================================= -->

<div id="competitor-modal"
     class="modal hidden">


    <div class="modal-content">


        <h2 id="modal-title">

            Add Competitor

        </h2>


        <input type="hidden"
               id="competitor-id">


        <label>

            Name

        </label>

        <input
            id="competitor-name"
            type="text">



        <label>

            Age

        </label>

        <input
            id="competitor-age"
            type="number">



        <label>

            Gender

        </label>

        <select id="competitor-gender">

            <option value="Male">
                Male
            </option>

            <option value="Female">
                Female
            </option>

            <option value="Non-binary">
                Non-binary
            </option>

        </select>



        <label>

            Competition Gender

        </label>

        <select id="competition-gender">

            <option value="Male">
                Male
            </option>

            <option value="Female">
                Female
            </option>

        </select>



        <label>

            Team

        </label>

        <select id="competitor-team">

        </select>



        <label>

            Active

        </label>

        <input
            id="competitor-active"
            type="checkbox"
            checked>



        <div class="modal-buttons">


            <button id="btn-cancel-competitor">

                Cancel

            </button>


            <button id="btn-save-competitor">

                Save

            </button>


        </div>


    </div>


</div>



<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>


</body>

</html>
